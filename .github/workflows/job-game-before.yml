name: Baseball Alert(Before)

on:
  schedule:
    - cron: "0 0 * * *"  # 매일 UTC 00:00 = 한국시간 09:00
  workflow_dispatch:      # 수동 실행도 가능하게

permissions:
  contents: write

jobs:
  notify-game-broadcast:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: Chrome 설치
        uses: browser-actions/setup-chrome@v1

      - name: 알림 실행
        run: python game_before.py
        env:
          KAKAO_ACCESS_TOKEN: ${{ secrets.KAKAO_ACCESS_TOKEN }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          GH_TOKEN: ${{secrets.GH_TOKEN}}
          GH_REPO: ${{secrets.GH_REPO}}
          DISCORD_WEBHOOK_URL: ${{secrets.DISCORD_WEBHOOK_URL}}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/pending_games.json || echo "파일 없음, 스킵"
          git diff --cached --quiet || git commit -m "Save pending games"
          git push